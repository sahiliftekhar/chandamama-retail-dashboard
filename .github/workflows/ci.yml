name: ChandaMama CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: chandamama-backend

jobs:

  # ── Job 1: Code Quality & Security ───────────────────────────────
  code-quality:
    name: 🔍 Code Quality (SonarQube)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 🔍 SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.projectKey=chandamama-retail-dashboard
            -Dsonar.projectName="ChandaMama Retail Dashboard"
            -Dsonar.projectVersion=2.4
            -Dsonar.sources=.
            -Dsonar.language=py
            -Dsonar.python.version=3.11
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/staticfiles/**,**/logs/**,**/backups/**,**/*backup*
        continue-on-error: true

  # ── Job 2: Django Tests ───────────────────────────────────────────
  test:
    name: ✅ Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: ✅ Run Django tests
        env:
          SECRET_KEY:        ${{ secrets.SECRET_KEY }}
          DEBUG:             "True"
          ALLOWED_HOSTS:     "*"
          POSTGRES_DB:       test_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST:           localhost
          DB_PORT:           "5432"
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"
          OWNER_WHATSAPP_NUMBER:  "whatsapp:+910000000000"
        run: |
          cd backend
          python manage.py migrate --noinput
          python manage.py test --verbosity=2

  # ── Job 3: Docker Build ───────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        run: |
          docker build ./backend -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker build ./backend -t ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Docker build successful"

      - name: 📊 Show image size
        run: docker images ${{ env.DOCKER_IMAGE }}

  # ── Job 4: Trivy Security Scan ────────────────────────────────────
  trivy-scan:
    name: 🛡️ Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build image for scanning
        run: docker build ./backend -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: 🛡️ Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          format:       "table"
          severity:     "CRITICAL,HIGH"
          exit-code:    "0"
        continue-on-error: true

      - name: 📄 Trivy scan — save report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          format:       "sarif"
          output:       "trivy-results.sarif"
          severity:     "CRITICAL,HIGH"
        continue-on-error: true

      - name: 📤 Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ── Job 5: Summary ────────────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [ code-quality, test, docker-build, trivy-scan ]
    if: always()

    steps:
      - name: 📊 Print summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║   ChandaMama CI/CD Pipeline Summary          ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📌 Branch:  ${{ github.ref_name }}"
          echo "📌 Commit:  ${{ github.sha }}"
          echo "📌 Trigger: ${{ github.event_name }}"
          echo "📌 Author:  ${{ github.actor }}"
          echo ""
          echo "Jobs:"
          echo "  🔍 Code Quality : ${{ needs.code-quality.result }}"
          echo "  ✅ Tests         : ${{ needs.test.result }}"
          echo "  🐳 Docker Build  : ${{ needs.docker-build.result }}"
          echo "  🛡️  Trivy Scan   : ${{ needs.trivy-scan.result }}"
          echo ""
          echo "✅ Pipeline complete!"

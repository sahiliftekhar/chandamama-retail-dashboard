# ============================================================
#  sonar-project.properties
#  SonarQube Configuration for ChandaMama Retail Dashboard
#  Place this file in: D:\DevSecOps-8th\MY_EOD\backend\
# ============================================================

# ── Project Info ──────────────────────────────────────────────────
sonar.projectKey=chandamama-retail-dashboard
sonar.projectName=ChandaMama Retail Dashboard
sonar.projectVersion=2.4

# ── Source code ───────────────────────────────────────────────────
sonar.sources=.
sonar.language=py

# ── Exclude non-essential paths ───────────────────────────────────
sonar.exclusions=\
    **/migrations/**,\
    **/staticfiles/**,\
    **/venv/**,\
    **/__pycache__/**,\
    **/tests/**,\
    **/node_modules/**,\
    **/*.pyc,\
    **/backups/**,\
    **/logs/**

# ── Test paths ────────────────────────────────────────────────────
sonar.tests=.
sonar.test.inclusions=**/tests/**

# ── SonarQube Server ──────────────────────────────────────────────
sonar.host.url=http://localhost:9000

# ── Python specific ───────────────────────────────────────────────
sonar.python.version=3.11

# ── Encoding ──────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8